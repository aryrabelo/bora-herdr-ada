[toolchain]
# Pinned so rustfmt/clippy/rustc behave identically across contributors and CI.
# CI installs floating `stable`; without this pin, formatting drifts whenever the
# stable rustfmt advances past the version the tree was last formatted with,
# breaking `cargo fmt --check` on otherwise-untouched files. Bump deliberately
# (and reformat the tree in the same commit) when adopting a newer toolchain.
channel = "1.93.0"
components = ["rustfmt", "clippy"]
